[build]
  command = "npm config set legacy-peer-deps true && npm install && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Nota audit SEO/GEO v3.0 (aprile 2026): il sito è pre-renderizzato a BUILD TIME
# da `vite-plugin-prerender` (vedi vite.config.ts) per tutte le 37 route principali.
# Ogni route ha il proprio `dist/<route>/index.html` con HTML completo leggibile
# senza JS — quindi Prerender.io/SSR runtime NON sono necessari.
# Per aggiungere nuove route al prerender: aggiornare l'array `routes` in vite.config.ts.