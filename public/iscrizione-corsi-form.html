<!DOCTYPE html>
<html>
<head>
  <title>Iscrizione Corsi - 3DMakes</title>
</head>
<body>
  <!-- Questo file aiuta Netlify a riconoscere il form di iscrizione ai corsi -->
  <form name="iscrizione-corsi" netlify netlify-honeypot="bot-field" hidden>
    <input type="text" name="firstName" />
    <input type="text" name="lastName" />
    <input type="email" name="email" />
    <input type="tel" name="phone" />
    <select name="timeSlot">
      <option value="">Seleziona uno slot</option>
      <option value="5-6-marzo">5-6 Marzo 2026 (Giovedì-Venerdì) - 17:30 - 21:30</option>
      <option value="12-13-marzo">12-13 Marzo 2026 (Giovedì-Venerdì) - 17:30 - 21:30</option>
      <option value="26-27-marzo">26-27 Marzo 2026 (Giovedì-Venerdì) - 17:30 - 21:30</option>
      <option value="2-3-aprile">2-3 Aprile 2026 (Giovedì-Venerdì) - 17:30 - 21:30</option>
      <option value="9-10-aprile">9-10 Aprile 2026 (Giovedì-Venerdì) - 17:30 - 21:30</option>
      <option value="16-17-aprile">16-17 Aprile 2026 (Giovedì-Venerdì) - 17:30 - 21:30</option>
      <option value="23-24-aprile">23-24 Aprile 2026 (Giovedì-Venerdì) - 17:30 - 21:30</option>
      <option value="30-1-aprile">30 Aprile-1 Maggio 2026 (Giovedì-Venerdì) - 17:30 - 21:30</option>
      <option value="7-8-maggio">7-8 Maggio 2026 (Giovedì-Venerdì) - 17:30 - 21:30</option>
      <option value="14-15-maggio">14-15 Maggio 2026 (Giovedì-Venerdì) - 17:30 - 21:30</option>
      <option value="21-22-maggio">21-22 Maggio 2026 (Giovedì-Venerdì) - 17:30 - 21:30</option>
      <option value="28-29-maggio">28-29 Maggio 2026 (Giovedì-Venerdì) - 17:30 - 21:30</option>
    </select>
    <textarea name="message"></textarea>
    <input type="checkbox" name="privacy" />
  </form>
</body>
</html>
