<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 480" fill="none">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#cbd5e1" stroke-width="1"/>
    </pattern>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f1f5f9"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
  </defs>

  <rect width="600" height="480" fill="url(#bg)" rx="16"/>
  <rect width="600" height="480" fill="url(#grid)" rx="16"/>

  <!-- Prop guard -->
  <g transform="translate(110 110)">
    <circle cx="0" cy="0" r="46" stroke="#3D9DFF" stroke-width="6" fill="#dbeafe"/>
    <circle cx="0" cy="0" r="28" stroke="#3D9DFF" stroke-width="4" fill="none"/>
  </g>

  <!-- GoPro mount -->
  <g transform="translate(260 100)">
    <rect x="-40" y="-20" width="80" height="40" rx="6" fill="#3D9DFF"/>
    <rect x="-30" y="-30" width="60" height="14" rx="3" fill="#1A2A4A"/>
    <circle cx="0" cy="0" r="6" fill="#ffffff"/>
  </g>

  <!-- Antenna mount -->
  <g transform="translate(420 110)">
    <rect x="-14" y="-40" width="28" height="80" rx="4" fill="#3D9DFF"/>
    <circle cx="0" cy="-40" r="10" fill="#1A2A4A"/>
    <line x1="0" y1="-40" x2="0" y2="-80" stroke="#1A2A4A" stroke-width="4"/>
  </g>

  <!-- Battery strap -->
  <g transform="translate(110 250)">
    <rect x="-60" y="-10" width="120" height="20" rx="4" fill="#1A2A4A"/>
    <rect x="-40" y="-6" width="80" height="12" rx="2" fill="#3D9DFF"/>
  </g>

  <!-- Alt. camera mount -->
  <g transform="translate(260 250)">
    <rect x="-35" y="-22" width="70" height="44" rx="8" fill="#3D9DFF"/>
    <rect x="-18" y="-10" width="36" height="20" rx="3" fill="#ffffff"/>
    <circle cx="0" cy="0" r="5" fill="#1A2A4A"/>
  </g>

  <!-- Landing gear -->
  <g transform="translate(420 250)">
    <path d="M -40 20 Q 0 -40 40 20" stroke="#1A2A4A" stroke-width="8" fill="none" stroke-linecap="round"/>
    <circle cx="-40" cy="20" r="6" fill="#3D9DFF"/>
    <circle cx="40" cy="20" r="6" fill="#3D9DFF"/>
  </g>

  <!-- LED holder -->
  <g transform="translate(180 390)">
    <rect x="-50" y="-12" width="100" height="24" rx="6" fill="#1A2A4A"/>
    <circle cx="-30" cy="0" r="5" fill="#fde047"/>
    <circle cx="-10" cy="0" r="5" fill="#34d399"/>
    <circle cx="10" cy="0" r="5" fill="#f472b6"/>
    <circle cx="30" cy="0" r="5" fill="#60a5fa"/>
  </g>

  <!-- Spare arms -->
  <g transform="translate(380 390)">
    <rect x="-50" y="-6" width="50" height="12" rx="3" fill="#3D9DFF" transform="rotate(-10)"/>
    <rect x="0" y="-6" width="50" height="12" rx="3" fill="#3D9DFF" transform="rotate(10)"/>
    <circle cx="-50" cy="0" r="5" fill="#1A2A4A"/>
    <circle cx="50" cy="0" r="5" fill="#1A2A4A"/>
  </g>

  <text x="300" y="455" text-anchor="middle" font-family="Montserrat, system-ui, -apple-system, sans-serif"
        font-size="13" font-weight="600" fill="#64748B" letter-spacing="2">
    PLACEHOLDER ACCESSORI · CARICA LA TUA FOTO
  </text>
</svg>
